<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BusTap — Live Departures</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #0b0f14;
      --surface:     #131920;
      --surface2:    #1a2230;
      --border:      #222d3a;
      --accent:      #00e5a0;
      --accent2:     #00b8d4;
      --warn:        #ffb830;
      --text:        #e8edf3;
      --muted:       #5a6a7a;
      --card-radius: 14px;
      --mono:        'Space Mono', monospace;
      --sans:        'DM Sans', sans-serif;
    }
    :root.light {
      --bg:      #f0f4f8;
      --surface:  #ffffff;
      --surface2: #e4ecf4;
      --border:   #c8d8e8;
      --text:     #1a2535;
      --muted:    #7a8fa6;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { transition: background .25s, color .25s; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.35;
      pointer-events: none; z-index: 0;
    }
    .page {
      position: relative; z-index: 1;
      max-width: 900px; margin: 0 auto;
      padding: 32px 24px 64px;
    }

    /* HEADER */
    header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 40px; gap: 16px; flex-wrap: wrap;
    }
    .brand { display: flex; align-items: center; gap: 14px; }
    .brand-icon {
      width: 48px; height: 48px; background: var(--accent);
      border-radius: 12px; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0;
    }
    .brand-icon svg { width: 26px; height: 26px; }
    .brand-text { display: flex; flex-direction: column; }
    .brand-name {
      font-family: var(--mono); font-size: 1.25rem; font-weight: 700;
      letter-spacing: -0.5px; color: var(--text); line-height: 1;
    }
    .brand-sub {
      font-size: 0.72rem; font-weight: 500; color: var(--accent);
      letter-spacing: 2px; text-transform: uppercase; margin-top: 4px;
    }
    #clock {
      font-family: var(--mono); font-size: 1.6rem; font-weight: 700;
      color: var(--text); letter-spacing: 1px; line-height: 1; text-align: right;
    }
    #clock-date { font-size: 0.75rem; color: var(--muted); margin-top: 4px; text-align: right; }

    /* ICON BUTTONS (sound + theme) */
    .icon-btns { display: flex; align-items: center; gap: 8px; }
    .icon-btn {
      width: 38px; height: 38px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; cursor: pointer; color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      transition: border-color .15s, color .15s, background .15s;
      flex-shrink: 0;
    }
    .icon-btn:hover  { border-color: var(--accent); color: var(--accent); background: rgba(0,229,160,.08); }
    .icon-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,229,160,.12); }
    .icon-btn svg { width: 17px; height: 17px; pointer-events: none; }

    /* HEALTH INDICATOR */
    .health-row { display: flex; align-items: center; gap: 8px; }
    .health-dot {
      width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
      background: var(--muted); transition: background .4s;
    }
    .health-dot.ok  { background: var(--accent); box-shadow: 0 0 5px var(--accent); }
    .health-dot.err { background: #f87171; box-shadow: 0 0 5px #f87171; animation: pulse 1.2s infinite; }
    .health-label { font-size: 0.74rem; color: var(--muted); font-family: var(--mono); }

    /* LANGUAGE BAR */
    .lang-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      padding: 16px 20px;
      margin-bottom: 24px;
      display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    }
    .lang-bar-icon {
      width: 36px; height: 36px;
      background: rgba(0,229,160,.12);
      border: 1px solid rgba(0,229,160,.25);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .lang-bar-icon svg { width: 18px; height: 18px; }
    .lang-bar-text { display: flex; flex-direction: column; gap: 2px; min-width: 100px; }
    .lang-bar-title { font-size: 0.78rem; font-weight: 600; color: var(--text); }
    .lang-bar-sub   { font-size: 0.7rem; color: var(--muted); }
    .lang-pills { display: flex; flex-wrap: wrap; gap: 7px; }
    .lang-pill {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 12px;
      font-family: var(--sans); font-size: 0.78rem; font-weight: 500; color: var(--text);
      cursor: pointer; transition: border-color .15s, background .15s, color .15s;
      white-space: nowrap; user-select: none;
    }
    .lang-pill:hover  { border-color: var(--accent); background: rgba(0,229,160,.08); }
    .lang-pill.active { border-color: var(--accent); background: rgba(0,229,160,.15); color: var(--accent); }
    .lang-pill .flag  { font-size: 1rem; line-height: 1; }

    /* STATS */
    .stats {
      display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 28px;
    }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--card-radius); padding: 18px 20px;
      display: flex; flex-direction: column; gap: 4px; transition: border-color .2s;
    }
    .stat-card:hover { border-color: var(--accent); }
    .stat-label { font-size: 0.7rem; font-weight: 500; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; }
    .stat-value { font-family: var(--mono); font-size: 1.6rem; font-weight: 700; color: var(--accent); line-height: 1; }
    .stat-sub   { font-size: 0.72rem; color: var(--muted); }

    /* CONTROLS */
    .controls { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .section-title {
      font-family: var(--mono); font-size: 0.8rem; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase; color: var(--muted); flex: 1;
    }
    .ws-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--muted); transition: background .3s; flex-shrink: 0;
    }
    .ws-dot.live { background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .ws-label { font-size: 0.72rem; color: var(--muted); }
    .route-wrap { position: relative; }
    select {
      appearance: none; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-family: var(--sans); font-size: 0.82rem; font-weight: 500;
      padding: 8px 32px 8px 12px; border-radius: 8px; cursor: pointer; outline: none;
      transition: border-color .2s;
    }
    select:focus, select:hover { border-color: var(--accent); }
    .route-wrap::after {
      content: '▾'; position: absolute; right: 10px; top: 50%;
      transform: translateY(-50%); color: var(--muted); pointer-events: none; font-size: 0.75rem;
    }

    /* DEPARTURES */
    #departures { display: flex; flex-direction: column; gap: 10px; }
    .empty-state {
      background: var(--surface); border: 1px dashed var(--border);
      border-radius: var(--card-radius); padding: 56px 24px; text-align: center; color: var(--muted);
    }
    .empty-state svg { margin-bottom: 16px; opacity: .4; }
    .empty-state p   { font-size: 0.85rem; }
    .dep-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--card-radius); padding: 18px 22px;
      display: flex; align-items: center; gap: 16px;
      animation: slideIn .35s ease both; transition: border-color .2s, background .2s;
    }
    @keyframes slideIn { from{opacity:0;transform:translateY(-12px)} to{opacity:1;transform:translateY(0)} }
    .dep-card:hover { border-color: var(--accent2); background: var(--surface2); }
    .dep-card.new-flash { animation: slideIn .35s ease both, flashBorder .8s ease forwards; }
    @keyframes flashBorder {
      0%  { border-color:var(--accent); box-shadow:0 0 0 2px rgba(0,229,160,.2); }
      100%{ border-color:var(--border); box-shadow:none; }
    }
    .dep-icon {
      width:44px; height:44px; border-radius:10px;
      background:var(--surface2); border:1px solid var(--border);
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }
    .dep-icon svg { width:22px; height:22px; }
    .dep-info { flex:1; min-width:0; }
    .dep-top { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:4px; }
    .dep-busid { font-family:var(--mono); font-size:0.95rem; font-weight:700; color:var(--text); }
    .dep-route {
      font-size:0.72rem; font-weight:600; letter-spacing:1px; text-transform:uppercase;
      color:var(--accent2); background:rgba(0,184,212,.12); border:1px solid rgba(0,184,212,.25);
      padding:2px 8px; border-radius:4px;
    }
    .dep-bottom { display:flex; align-items:center; gap:14px; font-size:0.78rem; color:var(--muted); flex-wrap:wrap; }
    .dep-bottom span { display:flex; align-items:center; gap:5px; }
    .dep-right { display:flex; flex-direction:column; align-items:flex-end; gap:8px; flex-shrink:0; }
    .dep-time  { font-family:var(--mono); font-size:0.78rem; color:var(--muted); white-space:nowrap; }
    .dep-badge { font-size:0.7rem; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; padding:3px 10px; border-radius:6px; }
    .dep-badge.leaving  { background:rgba(0,229,160,.15); color:var(--accent); border:1px solid rgba(0,229,160,.3); }
    .dep-badge.arriving { background:rgba(255,184,48,.12); color:var(--warn);  border:1px solid rgba(255,184,48,.25); }
    .dep-badge.default  { background:var(--surface2);     color:var(--muted); border:1px solid var(--border); }

    /* FOOTER */
    footer { margin-top:40px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; }
    #last-updated { font-size:0.74rem; color:var(--muted); font-family:var(--mono); }
    .footer-brand { font-size:0.74rem; color:var(--muted); }
    .footer-brand span { color:var(--accent); }

    .driver-link-wrap {
      margin-top: 28px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .driver-link-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 22px;
      font-family: var(--mono);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--accent);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      transition: border-color .15s, background .15s, color .15s;
    }
    .driver-link-btn:hover {
      border-color: var(--accent);
      background: rgba(0,229,160,.1);
    }

    .sim-mode-btn {
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      padding: 9px 14px;
      border-radius: 10px;
      cursor: pointer;
      color: var(--bg);
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border: none;
      flex-shrink: 0;
      transition: opacity .15s, transform .15s;
    }
    .sim-mode-btn:hover:not(:disabled) {
      opacity: 0.92;
      transform: translateY(-1px);
    }
    .sim-mode-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    @media(max-width:580px){
      .stats { grid-template-columns:repeat(2,1fr); }
      #clock { font-size:1.2rem; }
      .lang-pills { gap:5px; }
    }
  </style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <header>
    <div class="brand">
      <div class="brand-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0b0f14" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="6" width="20" height="12" rx="3"/>
          <path d="M2 10h20M7 18v2M17 18v2"/>
          <circle cx="7" cy="14" r="1" fill="#0b0f14" stroke="none"/>
          <circle cx="17" cy="14" r="1" fill="#0b0f14" stroke="none"/>
        </svg>
      </div>
      <div class="brand-text">
        <span class="brand-name">BusTap</span>
        <span class="brand-sub" data-i18n="brand_sub">Live Departures</span>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;justify-content:flex-end;">
      <button type="button" class="sim-mode-btn" id="simulation-mode-btn" title="Load sample data and walk through the app">Simulation Mode</button>
      <div class="icon-btns">
        <!-- Sound toggle -->
        <button class="icon-btn" id="sound-btn" aria-label="Toggle sound" title="Toggle sound alerts">
          <svg id="sound-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          </svg>
        </button>
        <!-- Theme toggle -->
        <button class="icon-btn" id="theme-btn" aria-label="Switch to light mode" title="Toggle light/dark mode">
          <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1"  x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22"  x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1"  y1="12" x2="3"  y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22"/>
          </svg>
        </button>
      </div>
      <div>
        <div id="clock">--:--:--</div>
        <div id="clock-date">--</div>
      </div>
    </div>
  </header>

  <!-- LANGUAGE BAR -->
  <div class="lang-bar" id="sim-tour-lang" role="region" aria-label="Language selection">
    <div class="lang-bar-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
    </div>
    <div class="lang-bar-text">
      <div class="lang-bar-title">Language / 语言 / Idioma</div>
      <div class="lang-bar-sub" data-i18n="lang_sub">Select your preferred language</div>
    </div>
    <div class="lang-pills" id="lang-pills" role="group" aria-label="Language options"></div>
  </div>

  <!-- STATS -->
  <div class="stats" id="sim-tour-stats">
    <div class="stat-card">
      <span class="stat-label" data-i18n="stat_departures_label">Departures Today</span>
      <span class="stat-value" id="stat-total">—</span>
      <span class="stat-sub"  data-i18n="stat_departures_sub">events logged</span>
    </div>
    <div class="stat-card">
      <span class="stat-label" data-i18n="stat_routes_label">Active Routes</span>
      <span class="stat-value" id="stat-routes">—</span>
      <span class="stat-sub"  data-i18n="stat_routes_sub">in service</span>
    </div>
    <div class="stat-card">
      <span class="stat-label" data-i18n="stat_last_label">Last Tap</span>
      <span class="stat-value" id="stat-last" style="font-size:1rem;margin-top:4px;">—</span>
      <span class="stat-sub"  id="stat-last-sub" data-i18n="stat_last_sub">no events yet</span>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls" id="sim-tour-controls">
    <span class="section-title" data-i18n="section_departures">Departures</span>
    <span class="ws-dot" id="ws-dot"></span>
    <span class="ws-label" id="ws-label" data-i18n="ws_connecting">Connecting…</span>
    <div class="route-wrap">
      <select id="routeSelect" aria-label="Filter by route"></select>
    </div>
  </div>

  <!-- LIST -->
  <div id="departures" role="list" aria-live="polite" aria-label="Departure events">
    <div class="empty-state" id="empty-state">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <rect x="2" y="6" width="20" height="12" rx="3"/>
        <path d="M2 10h20M7 18v2M17 18v2"/>
      </svg>
      <p data-i18n="loading">Loading departures…</p>
    </div>
  </div>

  <!-- FOOTER -->
  <footer id="sim-tour-footer">
    <span id="last-updated" data-i18n="last_updated_placeholder">Last updated: —</span>
    <div class="health-row">
      <div class="health-dot" id="health-dot"></div>
      <span class="health-label" id="health-label">API —</span>
    </div>
    <span class="footer-brand">Powered by <span>BusTap RFID</span></span>
  </footer>

  <div class="driver-link-wrap" id="sim-tour-driver-link">
    <a href="driver.html" class="driver-link-btn" data-i18n="link_driver">Driver dashboard</a>
    <a href="livemap.html" class="driver-link-btn" style="color:var(--accent2);border-color:rgba(0,184,212,.35);">San José live map</a>
  </div>

</div>
<script src="route-simulation.js"></script>

// RTL languages
const RTL_LANGS = new Set(['ar']);

// ── APP STATE ─────────────────────────────────────────────
let currentLang    = 'en';
let currentStrings = TRANSLATIONS.en;
let selectedRoute  = '';
let allEvents      = [];
let wsConnected    = false;

// ── DOM REFS ──────────────────────────────────────────────
const depList       = document.getElementById('departures');
const emptyState    = document.getElementById('empty-state');
const routeSel      = document.getElementById('routeSelect');
const wsDot         = document.getElementById('ws-dot');
const wsLabelEl     = document.getElementById('ws-label');
const statTotal     = document.getElementById('stat-total');
const statRoutes    = document.getElementById('stat-routes');
const statLast      = document.getElementById('stat-last');
const statLastSub   = document.getElementById('stat-last-sub');
const lastUpEl      = document.getElementById('last-updated');
const pillContainer = document.getElementById('lang-pills');

depList.addEventListener('click', (e) => {
  const btn = e.target.closest('button.dep-route');
  if (!btn || !btn.dataset.routeId) return;
  e.preventDefault();
  if (window.BustapRouteSim) window.BustapRouteSim.openRouteOverlay(btn.dataset.routeId);
});

// ── CLOCK ─────────────────────────────────────────────────
function updateClock() {
  const locale = currentLang === 'en' ? undefined : currentLang;
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString(locale, {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  document.getElementById('clock-date').textContent =
    now.toLocaleDateString(locale, {weekday:'long', month:'short', day:'numeric'});
}
updateClock();
setInterval(updateClock, 1000);

// ── FORMAT ────────────────────────────────────────────────
function fmtTime(ts) {
  const d = new Date(ts);
  if (isNaN(d)) return ts;
  const locale = currentLang === 'en' ? undefined : currentLang;
  return d.toLocaleTimeString(locale, {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}
function timeAgo(ts) {
  const sec = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (sec < 60)   return `${sec}s ago`;
  if (sec < 3600) return `${Math.floor(sec/60)}m ago`;
  return `${Math.floor(sec/3600)}h ago`;
}

// ── APPLY STRINGS ─────────────────────────────────────────
function applyStrings(s) {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.dataset.i18n;
    if (s[k] !== undefined) el.textContent = s[k];
  });
  wsLabelEl.textContent = wsConnected ? s.ws_live : s.ws_reconnecting;
  const allOpt = routeSel.querySelector('option[value=""]');
  if (allOpt) allOpt.textContent = s.route_all;
  if (allEvents.length > 0)
    lastUpEl.textContent = `${s.last_updated_prefix} ${fmtTime(allEvents[0].ts)}`;

  // RTL support
  document.documentElement.dir  = RTL_LANGS.has(currentLang) ? 'rtl' : 'ltr';
  document.documentElement.lang = currentLang;

  renderCards();
}

// ── LANGUAGE SWITCH (instant — no network) ────────────────
function switchLang(code, pill) {
  if (code === currentLang) return;
  currentLang    = code;
  currentStrings = TRANSLATIONS[code] || TRANSLATIONS.en;

  document.querySelectorAll('.lang-pill').forEach(p => {
    p.classList.remove('active');
    p.setAttribute('aria-pressed', 'false');
  });
  pill.classList.add('active');
  pill.setAttribute('aria-pressed', 'true');

  applyStrings(currentStrings);
}

// ── BUILD PILLS ───────────────────────────────────────────
function buildPills() {
  LANGUAGES.forEach(lang => {
    const btn = document.createElement('button');
    btn.className    = 'lang-pill' + (lang.code === 'en' ? ' active' : '');
    btn.dataset.lang = lang.code;
    btn.setAttribute('aria-pressed', lang.code === 'en' ? 'true' : 'false');
    btn.setAttribute('aria-label', lang.label);
    btn.innerHTML    = `<span class="flag" aria-hidden="true">${lang.flag}</span>${lang.label}`;
    btn.addEventListener('click', () => switchLang(lang.code, btn));
    pillContainer.appendChild(btn);
  });
}

// ── STATS ─────────────────────────────────────────────────
function updateStats() {
  statTotal.textContent = allEvents.length || '—';
  const routeSet = new Set(allEvents.map(e => e.route_id).filter(Boolean));
  statRoutes.textContent = routeSet.size || '—';
  if (allEvents.length > 0) {
    statLast.textContent    = allEvents[0].bus_id;
    statLastSub.textContent = timeAgo(allEvents[0].ts);
  } else {
    statLastSub.textContent = currentStrings.stat_last_sub;
  }
}

// ── CARD FACTORY ──────────────────────────────────────────
function makeCard(ev, isNew = false) {
  const card = document.createElement('div');
  card.className = 'dep-card' + (isNew ? ' new-flash' : '');
  card.setAttribute('role', 'listitem');

  const status   = (ev.status || 'leaving').toLowerCase();
  const badgeCls = status === 'leaving' ? 'leaving' : status === 'arriving' ? 'arriving' : 'default';
  // Use translated status label when available
  const statusLabel = currentStrings[`status_${status}`] || ev.status;
  const routeTag = ev.route_id
    ? `<button type="button" class="dep-route" data-route-id="${ev.route_id}">${ev.route_id}</button>`
    : '';
  const stopBit  = ev.stop_id
    ? `<span><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg>${ev.stop_id}</span>`
    : '';

  card.innerHTML = `
    <div class="dep-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="6" width="20" height="12" rx="3"/><path d="M2 10h20M7 18v2M17 18v2"/>
        <circle cx="7" cy="14" r="1" fill="var(--accent)" stroke="none"/>
        <circle cx="17" cy="14" r="1" fill="var(--accent)" stroke="none"/>
      </svg>
    </div>
    <div class="dep-info">
      <div class="dep-top">
        <span class="dep-busid">${ev.bus_id}</span>${routeTag}
      </div>
      <div class="dep-bottom">
        <span>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          ${ev.driver_id}
        </span>${stopBit}
      </div>
    </div>
    <div class="dep-right">
      <span class="dep-time">${fmtTime(ev.ts)}</span>
      <span class="dep-badge ${badgeCls}">${statusLabel}</span>
    </div>`;
  return card;
}

// ── RENDER ────────────────────────────────────────────────
function renderCards() {
  Array.from(depList.children).forEach(c => { if (c !== emptyState) c.remove(); });

  const filtered = selectedRoute
    ? allEvents.filter(e => e.route_id === selectedRoute)
    : allEvents;

  if (filtered.length === 0) {
    emptyState.style.display = '';
    emptyState.querySelector('p').textContent =
      allEvents.length ? currentStrings.no_events_route : currentStrings.no_events;
    return;
  }
  emptyState.style.display = 'none';
  filtered.forEach(ev => depList.appendChild(makeCard(ev, false)));
  if (allEvents.length > 0)
    lastUpEl.textContent = `${currentStrings.last_updated_prefix} ${fmtTime(allEvents[0].ts)}`;
  updateStats();
}

// ── LOAD EVENTS ───────────────────────────────────────────
async function loadEvents() {
  try {
    const res = await fetch(`${API}/events?limit=80`);
    const d   = await res.json();
    allEvents = d.items || [];
    renderCards();
  } catch {
    emptyState.querySelector('p').textContent = currentStrings.api_error;
  }
}

// ── LOAD ROUTES ───────────────────────────────────────────
async function loadRoutes() {
  const optAll = document.createElement('option');
  optAll.value = ''; optAll.textContent = currentStrings.route_all;
  routeSel.appendChild(optAll);
  try {
    const res = await fetch(`${API}/routes`);
    const d   = await res.json();
    (d.items || []).forEach(r => {
      const o = document.createElement('option');
      o.value = r.route_id; o.textContent = `${r.route_id} — ${r.name}`;
      routeSel.appendChild(o);
    });
  } catch (_) {}
  routeSel.addEventListener('change', () => {
    selectedRoute = routeSel.value;
    renderCards();
    if (window.BustapRouteSim) {
      window.BustapRouteSim.bindIndexOverlayKeys();
      window.BustapRouteSim.onRouteSelectChange(selectedRoute);
    }
  });
}

// ── WEBSOCKET ─────────────────────────────────────────────
function connectWS() {
  const ws = new WebSocket(WS);
  ws.onopen = () => {
    wsConnected = true;
    wsDot.classList.add('live');
    wsLabelEl.textContent = currentStrings.ws_live;
  };
  ws.onclose = () => {
    wsConnected = false;
    wsDot.classList.remove('live');
    wsLabelEl.textContent = currentStrings.ws_reconnecting;
    setTimeout(connectWS, 1500);
  };
  ws.onmessage = ({ data }) => {
    try {
      const payload = JSON.parse(data);
      if (payload?.type === 'event' && payload.data) {
        const ev = payload.data;
        allEvents.unshift(ev);
        playDepartureTone();
        updateStats();
        lastUpEl.textContent = `${currentStrings.last_updated_prefix} ${fmtTime(ev.ts)}`;
        if (!selectedRoute || ev.route_id === selectedRoute) {
          emptyState.style.display = 'none';
          const card = makeCard(ev, true);
          depList.insertBefore(card,
            depList.firstChild === emptyState ? emptyState.nextSibling : depList.firstChild);
        }
      }
    } catch (_) {}
  };
}

// ── SOUND ALERT ───────────────────────────────────────────
// Uses Web Audio API — no files needed, works fully offline.
// Two-tone "ding": a short high note followed by a lower one.
let audioCtx   = null;
let soundOn    = true;
const soundBtn  = document.getElementById('sound-btn');
const soundIcon = document.getElementById('sound-icon');

const SOUND_ICON_ON  = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
  <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
  <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>`;
const SOUND_ICON_OFF = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
  <line x1="23" y1="9" x2="17" y2="15"/>
  <line x1="17" y1="9" x2="23" y2="15"/>`;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playDepartureTone() {
  if (!soundOn) return;
  try {
    const ctx = getAudioCtx();
    // Resume in case browser suspended it (autoplay policy)
    if (ctx.state === 'suspended') ctx.resume();

    const notes = [
      { freq: 880, start: 0,    dur: 0.12, gain: 0.35 },  // high A5 — tap
      { freq: 660, start: 0.13, dur: 0.18, gain: 0.25 },  // E5 — settle
    ];
    notes.forEach(({ freq, start, dur, gain }) => {
      const osc  = ctx.createOscillator();
      const amp  = ctx.createGain();
      osc.connect(amp);
      amp.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
      amp.gain.setValueAtTime(0, ctx.currentTime + start);
      amp.gain.linearRampToValueAtTime(gain, ctx.currentTime + start + 0.01);
      amp.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
      osc.start(ctx.currentTime + start);
      osc.stop(ctx.currentTime + start + dur + 0.01);
    });
  } catch (e) { /* audio not supported */ }
}

function updateSoundIcon() {
  soundIcon.innerHTML = soundOn ? SOUND_ICON_ON : SOUND_ICON_OFF;
  soundBtn.classList.toggle('active', soundOn);
  soundBtn.setAttribute('aria-label', soundOn ? 'Mute sound alerts' : 'Enable sound alerts');
}

soundBtn.addEventListener('click', () => {
  soundOn = !soundOn;
  updateSoundIcon();
  // Unlock AudioContext on first user gesture
  if (soundOn) { try { getAudioCtx().resume(); } catch(_){} }
});
updateSoundIcon();

// ── API HEALTH CHECK ──────────────────────────────────────
// Pings the existing /events endpoint every 15 s.
// No backend changes required — uses what's already there.
const healthDot   = document.getElementById('health-dot');
const healthLabel = document.getElementById('health-label');

async function checkHealth() {
  try {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 4000);
    const res   = await fetch(`${API}/events?limit=1`, { signal: ctrl.signal });
    clearTimeout(timer);
    if (res.ok) {
      healthDot.className   = 'health-dot ok';
      healthLabel.textContent = 'API Online';
    } else {
      throw new Error('non-ok');
    }
  } catch {
    healthDot.className   = 'health-dot err';
    healthLabel.textContent = 'API Offline';
  }
}

checkHealth();
setInterval(checkHealth, 15_000);

if (window.BustapRouteSim) window.BustapRouteSim.bindIndexOverlayKeys();
buildPills();
loadRoutes();
loadEvents();
connectWS();
setInterval(updateStats, 30_000);
